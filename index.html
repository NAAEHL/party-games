<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jeux de Soirée · Party Games</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);font-family:'Segoe UI',system-ui,sans-serif;color:#fff}
  button{cursor:pointer;border:none;font-family:inherit}
  .screen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px}
  .screen.active{display:flex}
  .lang-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:48px 40px;text-align:center;max-width:380px;width:100%}
  .lang-emoji{font-size:64px;margin-bottom:16px}
  .lang-title{font-size:28px;font-weight:800;margin-bottom:32px;line-height:1.3;color:#fff}
  .lang-title span{color:#a0aec0;font-size:20px;font-weight:400;display:block}
  .lang-btns{display:flex;flex-direction:column;gap:12px}
  .lang-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-size:18px;padding:14px 24px;display:flex;align-items:center;gap:12px;transition:all .2s}
  .lang-btn:hover{background:rgba(255,255,255,.15)}
  .menu-wrap{max-width:560px;width:100%;text-align:center;position:relative}
  .lang-switch{position:absolute;top:-8px;right:0;background:rgba(255,255,255,.1);border-radius:8px;font-size:20px;padding:6px 10px}
  .menu-title{font-size:36px;font-weight:800;margin-bottom:8px}
  .menu-sub{color:#a0aec0;font-size:16px;margin-bottom:40px}
  .game-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
  .game-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:32px 24px;text-align:center;flex:1 1 200px;max-width:240px;transition:all .2s;color:#fff}
  .game-card:hover{background:rgba(255,255,255,.1);transform:translateY(-2px)}
  .game-icon{font-size:48px;margin-bottom:12px}
  .game-name{font-size:18px;font-weight:700;margin-bottom:8px}
  .game-desc{color:#718096;font-size:13px;line-height:1.5}
  .mode-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:36px;max-width:500px;width:100%;text-align:center}
  .mode-title{font-size:22px;font-weight:700;margin-bottom:8px}
  .mode-sub{color:#718096;font-size:14px;margin-bottom:28px}
  .mode-btns{display:flex;flex-direction:column;gap:12px}
  .mode-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;color:#fff;font-size:15px;font-weight:600;padding:16px 24px;text-align:left;display:flex;align-items:center;gap:12px;transition:all .2s}
  .mode-btn:hover{background:rgba(255,255,255,.12)}
  .mode-btn .mode-icon{font-size:28px}
  .mode-btn .mode-label{flex:1}
  .mode-btn .mode-tag{font-size:11px;color:#fc8181;background:rgba(252,129,129,.15);border:1px solid rgba(252,129,129,.3);border-radius:6px;padding:2px 8px}
  .nsfw-gate{background:rgba(252,129,129,.08);border:1px solid rgba(252,129,129,.3);border-radius:24px;padding:40px;max-width:420px;width:100%;text-align:center}
  .nsfw-emoji{font-size:56px;margin-bottom:16px}
  .nsfw-title{font-size:22px;font-weight:700;color:#fc8181;margin-bottom:12px}
  .nsfw-text{color:#a0aec0;font-size:14px;line-height:1.6;margin-bottom:28px}
  .nsfw-confirm{background:linear-gradient(135deg,#fc8181,#e53e3e);border-radius:12px;color:#fff;font-size:16px;font-weight:600;padding:14px 32px;width:100%;margin-bottom:12px}
  .nsfw-cancel{background:none;color:#a0aec0;font-size:14px;padding:8px}
  .wyr-wrap{max-width:600px;width:100%}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .back-btn{background:none;color:#a0aec0;font-size:14px;padding:0}
  .q-counter{color:#718096;font-size:13px}
  .progress-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-bottom:32px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,#4fd1c5,#667eea);border-radius:2px;transition:width .4s ease}
  .wyr-choices{display:flex;gap:16px;width:100%;flex-wrap:wrap;margin-bottom:16px}
  .wyr-option{flex:1 1 200px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);border-radius:16px;color:#e2e8f0;font-size:15px;font-weight:500;padding:28px 20px;text-align:center;line-height:1.5;transition:all .2s;position:relative;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
  .wyr-option:hover:not(:disabled){border-color:#4fd1c5;background:rgba(79,209,197,.08)}
  .wyr-option.chosen{border:2px solid #4fd1c5;background:rgba(79,209,197,.12);color:#fff}
  .wyr-option.not-chosen{opacity:.4}
  .vote-pct{font-size:28px;font-weight:800;color:#4fd1c5}
  .or-badge{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;color:#a0aec0;font-weight:700;font-size:13px;flex-shrink:0;align-self:center}
  .vote-bar{display:flex;width:100%;height:6px;border-radius:3px;overflow:hidden;margin-bottom:8px}
  .vote-seg-a{height:100%;background:#4fd1c5;transition:width .6s ease}
  .vote-seg-b{height:100%;background:#667eea;transition:width .6s ease}
  .vote-count{color:#718096;font-size:12px;text-align:center;margin-bottom:12px}
  .btn-primary{background:linear-gradient(135deg,#4fd1c5,#667eea);border-radius:12px;color:#fff;font-size:16px;font-weight:600;padding:14px 32px;width:100%;max-width:320px;display:block;margin:8px auto 0}
  .btn-primary:hover{opacity:.9}
  .btn-secondary{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:12px;color:#a0aec0;font-size:15px;padding:12px 24px}
  .btn-secondary:hover{background:rgba(255,255,255,.14)}
  .done-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:48px;text-align:center;max-width:400px;width:100%;display:flex;flex-direction:column;align-items:center}
  .done-title{font-size:28px;font-weight:700;margin:16px 0 8px}
  .done-sub{color:#a0aec0;margin-bottom:32px}
  .ip-wrap{max-width:540px;width:100%}
  .ip-title{font-size:26px;font-weight:700;margin-bottom:6px;text-align:center}
  .ip-sub{color:#718096;font-size:14px;text-align:center;margin-bottom:28px;line-height:1.5}
  .points-badge{border-radius:20px;padding:6px 16px;font-weight:700;font-size:14px;transition:background .3s}
  .points-ok{background:#68d391;color:#1a1a2e}
  .points-warn{background:#f6e05e;color:#1a1a2e}
  .points-over{background:#fc8181;color:#1a1a2e}
  .sliders{display:flex;flex-direction:column;gap:16px}
  .slider-row{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px 18px}
  .slider-header{display:flex;justify-content:space-between;align-items:center;color:#e2e8f0;font-weight:600;font-size:15px;margin-bottom:4px}
  .slider-val{color:#4fd1c5;font-weight:700;font-size:16px}
  .slider-desc{color:#718096;font-size:12px;margin:0 0 12px}
  input[type=range]{width:100%;accent-color:#4fd1c5;cursor:pointer}
  .range-labels{display:flex;justify-content:space-between;color:#4a5568;font-size:11px;margin-top:2px}
  .error-msg{color:#fc8181;text-align:center;font-size:13px;margin-top:8px}
  .ip-actions{display:flex;gap:12px;margin-top:24px;justify-content:center;flex-wrap:wrap}
  .ip-result{max-width:520px;width:100%;display:flex;flex-direction:column;gap:16px}
  .result-title{font-size:26px;font-weight:700;text-align:center}
  .result-sub{color:#718096;font-size:14px;text-align:center}
  .radar{display:flex;flex-direction:column;gap:10px;background:rgba(255,255,255,.03);border-radius:16px;padding:20px}
  .radar-row{display:flex;align-items:center;gap:10px}
  .radar-icon{font-size:20px;width:28px}
  .radar-label{color:#a0aec0;font-size:13px;width:150px;flex-shrink:0}
  .radar-bar-bg{flex:1;height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
  .radar-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
  .radar-score{color:#e2e8f0;font-weight:700;font-size:13px;width:40px;text-align:right}
  .insights{display:flex;flex-direction:column;gap:10px}
  .insight-card{background:rgba(255,255,255,.04);border:1px solid rgba(79,209,197,.3);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px}
  .insight-card.danger{border-color:rgba(252,129,129,.3)}
  .insight-label{color:#718096;font-size:12px;margin-bottom:2px}
  .insight-value{color:#fff;font-weight:600;font-size:15px}
  .center{text-align:center}
  .mt16{margin-top:16px}
  @media(max-width:480px){
    .wyr-choices{flex-direction:column}
    .or-badge{transform:rotate(90deg)}
    .lang-card{padding:32px 24px}
  }

  /* ── DUEL DE PAYS ── */
  .duel-wrap{max-width:700px;width:100%;display:flex;flex-direction:column;gap:16px}
  .duel-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .duel-scores{display:flex;gap:12px;align-items:center}
  .duel-score-card{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:10px 18px;text-align:center;min-width:90px;transition:all .3s}
  .duel-score-card.active-player{border-color:#4fd1c5;background:rgba(79,209,197,.12)}
  .duel-score-card.loser{border-color:#fc8181;background:rgba(252,129,129,.1)}
  .duel-player-name{font-size:12px;color:#a0aec0;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .duel-player-score{font-size:28px;font-weight:800;color:#fff}
  .duel-vs{color:#4a5568;font-weight:700;font-size:18px}
  .duel-turn-banner{background:rgba(79,209,197,.1);border:1px solid rgba(79,209,197,.3);border-radius:12px;padding:10px 16px;text-align:center;color:#4fd1c5;font-weight:600;font-size:15px}
  .duel-timer{font-size:32px;font-weight:800;color:#fff;text-align:center;width:56px;height:56px;border-radius:50%;border:3px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0}
  .duel-timer.warning{border-color:#f6e05e;color:#f6e05e}
  .duel-timer.danger{border-color:#fc8181;color:#fc8181;animation:pulse .5s infinite alternate}
  @keyframes pulse{to{transform:scale(1.1)}}
  .duel-input-row{display:flex;gap:10px}
  .duel-input{flex:1;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-size:18px;font-weight:600;padding:14px 18px;outline:none;transition:border .2s}
  .duel-input:focus{border-color:#4fd1c5}
  .duel-input.shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
  .duel-input.valid-flash{border-color:#68d391;background:rgba(104,211,145,.1)}
  .duel-submit{background:linear-gradient(135deg,#4fd1c5,#667eea);border-radius:12px;color:#fff;font-size:16px;font-weight:700;padding:14px 20px}
  .duel-map-wrap{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px;overflow:hidden}
  .duel-map-wrap svg{width:100%;height:auto;display:block}
  .duel-map-wrap path{fill:#2d3748;stroke:#4a5568;stroke-width:.5;transition:fill .3s;cursor:default}
  .duel-map-wrap path.found-p1{fill:#4fd1c5}
  .duel-map-wrap path.found-p2{fill:#a78bfa}
  .duel-countries-wrap{max-height:120px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:6px;padding:4px}
  .duel-country-tag{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600}
  .duel-country-tag.p1{background:rgba(79,209,197,.2);color:#4fd1c5;border:1px solid rgba(79,209,197,.3)}
  .duel-country-tag.p2{background:rgba(167,139,250,.2);color:#a78bfa;border:1px solid rgba(167,139,250,.3)}
  .duel-feedback{min-height:28px;text-align:center;font-size:14px;font-weight:600;transition:all .3s}
  .duel-feedback.ok{color:#68d391}
  .duel-feedback.err{color:#fc8181}
  .duel-result-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:40px;text-align:center;max-width:420px;width:100%;display:flex;flex-direction:column;align-items:center;gap:16px}
  .duel-winner-emoji{font-size:64px}
  .duel-winner-title{font-size:28px;font-weight:800}
  .duel-winner-sub{color:#a0aec0;font-size:15px}
  .duel-stats{display:flex;gap:24px;justify-content:center}
  .duel-stat{text-align:center}
  .duel-stat-num{font-size:32px;font-weight:800;color:#4fd1c5}
  .duel-stat-label{font-size:12px;color:#718096;margin-top:2px}
  .duel-setup-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:36px;max-width:440px;width:100%;text-align:center}
  .duel-name-inputs{display:flex;flex-direction:column;gap:12px;margin:20px 0}
  .duel-name-input{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-size:16px;font-weight:600;padding:12px 16px;outline:none;text-align:center}
  .duel-name-input:focus{border-color:#4fd1c5}
  .duel-name-input::placeholder{color:#4a5568}

  /* ── 3 OUI / 3 NON ── */
  .on-players-list{display:flex;flex-direction:column;gap:10px;margin:20px 0}
  .on-player-row{display:flex;align-items:center;gap:8px}
  .on-player-row input{flex:1;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-size:16px;font-weight:600;padding:12px 16px;outline:none;text-align:center;min-width:0}
  .on-player-row input:focus{border-color:#4fd1c5}
  .on-player-row input::placeholder{color:#4a5568}
  .on-remove-player{flex:0 0 auto;background:rgba(252,129,129,.12);border:1px solid rgba(252,129,129,.3);color:#fc8181;border-radius:10px;width:38px;height:38px;font-size:18px;line-height:1;cursor:pointer}
  .on-remove-player:hover{background:rgba(252,129,129,.22)}
  .on-remove-player:disabled{opacity:.3;cursor:default}
  .on-situ-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:32px 24px;font-size:19px;font-weight:600;line-height:1.5;text-align:center;color:#fff;min-height:140px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
  .on-tally{display:flex;justify-content:center;gap:24px;margin-bottom:20px;font-size:14px;color:#a0aec0;font-weight:600}
  .on-tally span{color:#4fd1c5;font-weight:800}
  .on-tally .on-tally-no span{color:#fc8181}
  .on-choices{display:flex;gap:16px}
  .on-choice-btn{flex:1;border-radius:16px;font-size:18px;font-weight:800;padding:22px 16px;transition:all .2s;border:2px solid transparent}
  .on-choice-yes{background:rgba(79,209,197,.12);border-color:rgba(79,209,197,.4);color:#4fd1c5}
  .on-choice-yes:hover:not(:disabled){background:rgba(79,209,197,.22)}
  .on-choice-no{background:rgba(252,129,129,.12);border-color:rgba(252,129,129,.4);color:#fc8181}
  .on-choice-no:hover:not(:disabled){background:rgba(252,129,129,.22)}
  .on-choice-btn:disabled{opacity:.3;cursor:not-allowed}
  .on-results-table-wrap{overflow-x:auto;margin:20px 0;display:flex;flex-direction:column;gap:24px}
  .on-result-block{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px 18px}
  .on-result-player-name{color:#4fd1c5;font-size:15px;font-weight:800;margin-bottom:10px}
  .on-results-table{width:100%;border-collapse:collapse;font-size:13px}
  .on-results-table td{padding:10px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.08)}
  .on-results-table td.on-situ-cell{text-align:left;color:#cbd5e0;font-weight:500;max-width:520px;font-size:12.5px;line-height:1.4}
  .on-cell-yes{color:#4fd1c5;font-weight:800;font-size:16px;width:36px}
  .on-cell-no{color:#fc8181;font-weight:800;font-size:16px;width:36px}

  /* ── DRAPEAUX ── */
  .flag-wrap{max-width:520px;width:100%;display:flex;flex-direction:column;align-items:center;gap:18px}
  .flag-top-bar{width:100%;display:flex;align-items:center;justify-content:space-between}
  .flag-score-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:8px 16px;font-size:13px;color:#a0aec0;font-weight:600;text-align:center}
  .flag-score-box span{display:block;font-size:22px;font-weight:800;color:#fff}
  .flag-progress{width:100%;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
  .flag-progress-bar{height:100%;background:linear-gradient(90deg,#4fd1c5,#667eea);border-radius:3px;transition:width .4s}
  .flag-display{font-size:110px;line-height:1;text-align:center;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4));user-select:none}
  .flag-question{font-size:15px;color:#718096;text-align:center}
  .flag-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
  .flag-choice{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:14px;color:#fff;font-size:15px;font-weight:600;padding:14px 10px;text-align:center;transition:all .2s;cursor:pointer}
  .flag-choice:hover:not(:disabled){background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);transform:translateY(-1px)}
  .flag-choice.correct{border-color:#68d391;background:rgba(104,211,145,.15);color:#68d391}
  .flag-choice.wrong{border-color:#fc8181;background:rgba(252,129,129,.1);color:#fc8181}
  .flag-choice.reveal{border-color:#68d391;background:rgba(104,211,145,.1)}
  .flag-choice:disabled{cursor:default}
  .flag-streak{font-size:13px;color:#f6e05e;font-weight:700;min-height:20px;text-align:center}
  .flag-result-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:40px 32px;text-align:center;max-width:420px;width:100%;display:flex;flex-direction:column;align-items:center;gap:16px}
  .flag-result-emoji{font-size:64px}
  .flag-result-title{font-size:26px;font-weight:800}
  .flag-result-sub{color:#a0aec0;font-size:15px}
  .flag-result-stats{display:flex;gap:28px;justify-content:center;margin:4px 0}
  .flag-stat{text-align:center}
  .flag-stat-num{font-size:34px;font-weight:800;color:#4fd1c5}
  .flag-stat-label{font-size:12px;color:#718096;margin-top:2px}
  .flag-setup-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:36px;max-width:460px;width:100%;text-align:center}
  .flag-mode-btns{display:flex;flex-direction:column;gap:10px;margin-top:20px}
  /* duel flag */
  .flag-duel-bar{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .flag-duel-score{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:12px;padding:8px 16px;text-align:center;min-width:80px;transition:all .3s}
  .flag-duel-score.active{border-color:#4fd1c5;background:rgba(79,209,197,.1)}
  .flag-duel-score .pname{font-size:11px;color:#718096;font-weight:700;text-transform:uppercase}
  .flag-duel-score .pscore{font-size:24px;font-weight:800;color:#fff}
  .flag-duel-setup{display:flex;flex-direction:column;gap:12px;margin:20px 0}

  /* ── GÉOGUESSR ── */
  .geo-wrap{max-width:600px;width:100%;display:flex;flex-direction:column;gap:16px}
  .geo-top-bar{display:flex;align-items:center;justify-content:space-between}
  .geo-score-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:8px 16px;text-align:center}
  .geo-score-box span{display:block;font-size:22px;font-weight:800;color:#fff}
  .geo-score-box small{font-size:11px;color:#718096}

// ── WYR ───────────────────────────────────────────────────────────
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startWYR(mode) {
  wyrMode = mode;
  wyrQueue = shuffle(mode==="nsfw" ? QNSFW[lang] : Q[lang]);
  wyrIdx=0; wyrChosen=null; wyrRevealed=false; wyrVotes=null;
  renderWYR();
  goTo("s-wyr");
}

function restartWYR() { startWYR(wyrMode); }

function renderWYR() {
  const t = T[lang];
  const q = wyrQueue[wyrIdx];
  const total = wyrQueue.length;
  document.getElementById("wyr-back-btn").textContent = t.wyrBack;
  document.getElementById("wyr-counter").textContent = `${t.qLabel} ${wyrIdx+1} ${t.ofLabel} ${total}`;
  document.getElementById("wyr-progress").style.width = `${(wyrIdx/total)*100}%`;
  const pA = getPct("a"), pB = getPct("b");
  document.getElementById("wyr-choices").innerHTML = `
    <button class="wyr-option${wyrChosen==="a"?" chosen":""}${wyrRevealed&&wyrChosen!=="a"?" not-chosen":""}"
      onclick="handleChoice('a')" ${wyrChosen?"disabled":""}>
      ${q.a}${wyrRevealed?`<div class="vote-pct">${pA}%</div>`:""}
    </button>
    <div class="or-badge">${t.or}</div>
    <button class="wyr-option${wyrChosen==="b"?" chosen":""}${wyrRevealed&&wyrChosen!=="b"?" not-chosen":""}"
      onclick="handleChoice('b')" ${wyrChosen?"disabled":""}>
      ${q.b}${wyrRevealed?`<div class="vote-pct">${pB}%</div>`:""}
    </button>`;
  const vb = document.getElementById("wyr-vote-bar");
  const vc = document.getElementById("wyr-vote-count");
  const ac = document.getElementById("wyr-actions");
  if(wyrRevealed && wyrVotes) {
    vb.style.display="flex";
    document.getElementById("vote-seg-a").style.width=pA+"%";
    document.getElementById("vote-seg-b").style.width=pB+"%";
    vc.style.display="block";
    vc.textContent = t.voteCount(wyrVotes.a, wyrVotes.b);
    ac.innerHTML=`<button class="btn-primary" onclick="nextWYR()">${t.next}</button>`;
  } else if(wyrChosen) {
    vb.style.display="none"; vc.style.display="none";
    ac.innerHTML=`<button class="btn-primary" onclick="revealWYR()">${t.reveal}</button>`;
  } else {
    vb.style.display="none"; vc.style.display="none"; ac.innerHTML="";
  }
}

function getPct(side) {
  if(!wyrVotes) return 50;
  const tot=wyrVotes.a+wyrVotes.b;
  if(tot===0) return 50;
  return Math.round((wyrVotes[side]/tot)*100);
}

async function handleChoice(choice) {
  if(wyrChosen) return;
  wyrChosen=choice;
  renderWYR();
  await castVote(wyrQueue[wyrIdx].id, choice);
}

async function revealWYR() {
  wyrVotes = await getVotes(wyrQueue[wyrIdx].id);
  wyrRevealed=true;
  renderWYR();
}

function nextWYR() {
  wyrIdx++;
  if(wyrIdx>=wyrQueue.length) {
    const t=T[lang];
    document.getElementById("done-title").textContent=t.doneTitle;
    document.getElementById("done-sub").textContent=t.doneSub(wyrQueue.length);
    document.getElementById("done-again").textContent=t.playAgain;
    document.getElementById("done-menu").textContent=t.backToMenu;
    goTo("s-wyr-done");
  } else {
    wyrChosen=null; wyrRevealed=false; wyrVotes=null;
    renderWYR();
  }
}

function startIP() {
  ipScores={intelligence:7,beauty:7,intimacy:7,compat:6,care:7,money:6};
  renderIP(); goTo("s-ip");
}

function renderIP() {
  const t=T[lang];
  document.getElementById("ip-back").textContent=t.back;
  document.getElementById("ip-title").textContent=t.ipTitle;
  document.getElementById("ip-sub-text").textContent=t.ipSub;
  document.getElementById("ip-reset").textContent=t.reset;
  document.getElementById("ip-validate").textContent=t.validate;
  const used=Object.values(ipScores).reduce((a,b)=>a+b,0);
  const left=40-used;
  const badge=document.getElementById("ip-points-badge");
  badge.textContent=t.ptsLeft(left);
  badge.className="points-badge "+(left<0?"points-over":left===0?"points-ok":"points-warn");
  document.getElementById("ip-sliders").innerHTML=IP_CATS.map(cat=>{
    const c=t.cats[cat];
    return `<div class="slider-row">
      <div class="slider-header"><span>${c.icon} ${c.name}</span><span class="slider-val">${ipScores[cat]}/10</span></div>
      <p class="slider-desc">${c.desc}</p>
      <input type="range" min="1" max="10" value="${ipScores[cat]}" oninput="setScore('${cat}',this.value)"/>
      <div class="range-labels"><span>1</span><span>5</span><span>10</span></div>
    </div>`;
  }).join("");
}

function setScore(cat,val) {
  const v=Math.max(1,Math.min(10,Number(val)));
  const test={...ipScores,[cat]:v};
  if(Object.values(test).reduce((a,b)=>a+b,0)<=40){
    ipScores[cat]=v;
    document.getElementById("ip-error").style.display="none";
  } else {
    document.getElementById("ip-error").style.display="block";
    document.getElementById("ip-error").textContent=T[lang].pointsError;
  }
  renderIP();
}

function resetIP(){startIP();}

function validateIP(){
  if(Object.values(ipScores).reduce((a,b)=>a+b,0)!==40){
    document.getElementById("ip-error").style.display="block";
    document.getElementById("ip-error").textContent=T[lang].pointsError;
    return;
  }
  showIPResult();
}

function showIPResult(){
  const t=T[lang];
  document.getElementById("ip-result-back").textContent=t.back;
  document.getElementById("ip-result-title").textContent=t.resultTitle;
  document.getElementById("ip-result-sub").textContent=t.resultSub;
  document.getElementById("ip-play-again").textContent=t.playAgain;
  const sorted=[...IP_CATS].sort((a,b)=>ipScores[b]-ipScores[a]);
  const bottom=[...IP_CATS].sort((a,b)=>ipScores[a]-ipScores[b])[0];
  document.getElementById("ip-radar").innerHTML=IP_CATS.map(cat=>{
    const c=t.cats[cat];
    const pct=(ipScores[cat]/10)*100;
    const col=ipScores[cat]>=8?"#68d391":ipScores[cat]>=5?"#4fd1c5":"#fc8181";
    return `<div class="radar-row">
      <span class="radar-icon">${c.icon}</span>
      <span class="radar-label">${c.name}</span>
      <div class="radar-bar-bg"><div class="radar-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <span class="radar-score">${ipScores[cat]}/10</span>
    </div>`;
  }).join("");
  const top=sorted[0],second=sorted[1];
  document.getElementById("ip-insights").innerHTML=`
    <div class="insight-card"><span style="font-size:28px">${t.cats[top].icon}</span>
      <div><div class="insight-label">${t.dominant}</div><div class="insight-value">${t.cats[top].name}</div></div></div>
    <div class="insight-card"><span style="font-size:28px">${t.cats[second].icon}</span>
      <div><div class="insight-label">${t.secondary}</div><div class="insight-value">${t.cats[second].name}</div></div></div>
    <div class="insight-card danger"><span style="font-size:28px">${t.cats[bottom].icon}</span>
      <div><div class="insight-label">${t.sacrifice}</div><div class="insight-value">${t.cats[bottom].name}</div></div></div>`;
  goTo("s-ip-result");
}

// ── 3 OUI / 3 NON ─────────────────────────────────────────────────
function onRenderPlayersList() {
  const t = T[lang];
  const list = document.getElementById("on-players-list");
  if (!list) return;
  const canRemove = onPlayerNames.length > 1;
  list.innerHTML = onPlayerNames.map((name, i) => `
    <div class="on-player-row">
      <input type="text" maxlength="20" placeholder="${t.duelP1.replace('1', String(i+1))}"
        value="${name.replace(/"/g, '&quot;')}" oninput="onUpdatePlayerName(${i}, this.value)"/>
      <button class="on-remove-player" onclick="onRemovePlayer(${i})" ${canRemove ? "" : "disabled"}>✕</button>
    </div>
  `).join("");
}

function onUpdatePlayerName(i, value) {
  onPlayerNames[i] = value;
}

function onAddPlayer() {
  if (onPlayerNames.length >= 12) return;
  onPlayerNames.push("");
  onRenderPlayersList();
}

function onRemovePlayer(i) {
  if (onPlayerNames.length <= 1) return;
  onPlayerNames.splice(i, 1);
  onRenderPlayersList();
}

function onStartGame() {
  const t = T[lang];
  const errorEl = document.getElementById("on-setup-error");
  const rawNames = onPlayerNames.map((n, i) => n.trim() || `${t.duelP1.replace('1', String(i+1))}`);

  // Garantir des noms uniques pour éviter les collisions de clés dans onAnswers/onPlayerQueues
  const seen = {};
  const names = rawNames.map(n => {
    seen[n] = (seen[n] || 0) + 1;
    return seen[n] > 1 ? `${n} (${seen[n]})` : n;
  });

  errorEl.style.display = "none";
  onPlayerNames = names;

  const situationsPerPlayer = 6;
  const bank = shuffle(ONQuestions[lang]);
  const totalNeeded = situationsPerPlayer * names.length;

  onPlayerQueues = {};
  onAnswers = {};

  if (totalNeeded <= bank.length) {
    // Assez de situations dans la banque pour garantir zéro recoupement entre joueurs
    names.forEach((name, i) => {
      onPlayerQueues[name] = bank.slice(i * situationsPerPlayer, (i + 1) * situationsPerPlayer);
      onAnswers[name] = [];
    });
  } else {
    // Pas assez de situations uniques pour tout le monde : on repart d'un lot mélangé
    // différent pour chaque joueur (ré-mélangé individuellement), en acceptant un recoupement partiel.
    names.forEach((name) => {
      onPlayerQueues[name] = shuffle(ONQuestions[lang]).slice(0, situationsPerPlayer);
      onAnswers[name] = [];
    });
  }

  onPlayerIdx = 0;
  onSituIdx = 0;

  if (names.length === 1) {
    // Solo : pas besoin d'écran de passage, on entre directement dans le jeu
    onBeginPlayerTurn();
  } else {
    onShowHandoff();
  }
}

function onShowHandoff() {
  const t = T[lang];
  const name = onPlayerNames[onPlayerIdx];
  document.getElementById("on-handoff-title").textContent = t.onHandoffTitle(name);
  document.getElementById("on-handoff-sub").textContent = t.onHandoffSub;
  goTo("s-on-handoff");
}

function onBeginPlayerTurn() {
  onSituIdx = 0;
  onRenderSitu();
  goTo("s-on-play");
}

function onRenderSitu() {
  const t = T[lang];
  const name = onPlayerNames[onPlayerIdx];
  const queue = onPlayerQueues[name];
  const situ = queue[onSituIdx];
  const total = queue.length;
  const answers = onAnswers[name];
  const yesCount = answers.filter(a => a === true).length;
  const noCount = answers.filter(a => a === false).length;

  document.getElementById("on-counter").textContent = t.onCounter(onSituIdx + 1, total);
  document.getElementById("on-player-badge").textContent = onPlayerNames.length > 1 ? t.onPlayerBadge(name) : "";
  document.getElementById("on-progress").style.width = `${(onSituIdx / total) * 100}%`;
  document.getElementById("on-situ-text").textContent = situ.text;
  document.getElementById("on-tally").innerHTML = `
    <span class="on-tally-yes">${t.onTallyYes(yesCount)}</span>
    <span class="on-tally-no">${t.onTallyNo(noCount)}</span>`;

  const yesBtn = document.getElementById("on-btn-yes");
  const noBtn = document.getElementById("on-btn-no");
  // Forçage : si un camp a déjà atteint 3, il devient indisponible pour les situations restantes
  yesBtn.disabled = yesCount >= 3;
  noBtn.disabled = noCount >= 3;
}

function onAnswer(isYes) {
  const name = onPlayerNames[onPlayerIdx];
  onAnswers[name].push(isYes);

  onSituIdx++;
  if (onSituIdx >= onPlayerQueues[name].length) {
    onPlayerIdx++;
    if (onPlayerIdx >= onPlayerNames.length) {
      onRenderResults();
    } else {
      onShowHandoff();
    }
  } else {
    onRenderSitu();
  }
}

function onRenderResults() {
  const t = T[lang];
  const container = document.getElementById("on-results-table");
  const blocks = onPlayerNames.map(name => {
    const queue = onPlayerQueues[name];
    const answers = onAnswers[name];
    const rows = queue.map((situ, idx) => {
      const ans = answers[idx];
      const cellClass = ans ? "on-cell-yes" : "on-cell-no";
      const icon = ans ? "✅" : "❌";
      return `<tr><td class="on-situ-cell">${situ.text}</td><td class="${cellClass}">${icon}</td></tr>`;
    }).join("");
    const heading = onPlayerNames.length > 1 ? `<h3 class="on-result-player-name">${name}</h3>` : "";
    return `
      <div class="on-result-block">
        ${heading}
        <table class="on-results-table">${rows}</table>
      </div>`;
  }).join("");
  container.innerHTML = blocks;
  goTo("s-on-result");
}

function buildMapSVG() {
  const paths = WORLD_COUNTRIES.filter(c => c.d).map(c => {
    const label = lang === "fr" ? c.fr : c.en;
    return `<path data-country="${label.replace(/"/g,'&quot;')}" d="${c.d}"/>`;
  }).join("");
  return `<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
}

// State
let duelP1 = "Joueur 1", duelP2 = "Joueur 2";
let duelCurrentPlayer = 1;
let duelScores = {1: 0, 2: 0};
let duelFoundCountries = {}; // {normalizedName: playerNum}
let duelTimerSeconds = 30;
let duelTimerMax = 30;
let duelTimerInterval = null;
let duelActive = false;

function normalize(str) {
  return str.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[''`]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

// Build lookup: normalized → canonical
function buildCountryLookup() {
  const lookup = {};
  WORLD_COUNTRIES.forEach(c => {
    const name = lang === "fr" ? c.fr : c.en;
    lookup[normalize(name)] = name;
  });
  return lookup;
}

// Levenshtein edit distance (for spelling-tolerant matching, JetPunk-style)
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  const dp = new Array(n + 1);
  for (let j = 0; j <= n; j++) dp[j] = j;
  for (let i = 1; i <= m; i++) {
    let prev = dp[0];
    dp[0] = i;
    for (let j = 1; j <= n; j++) {
      const tmp = dp[j];
      dp[j] = a[i-1] === b[j-1]
        ? prev
        : Math.min(prev + 1, dp[j] + 1, dp[j-1] + 1);
      prev = tmp;
    }
  }
  return dp[n];
}

// Find the best fuzzy match for a normalized input among the lookup keys.
// Tolerance scales with word length (longer names allow more typos), like JetPunk.
function fuzzyCountryMatch(normInput, lookup) {
  if (lookup[normInput]) return lookup[normInput];
  let bestKey = null, bestDist = Infinity;
  for (const key of Object.keys(lookup)) {
    // Quick length filter to avoid wasted comparisons
    if (Math.abs(key.length - normInput.length) > 3) continue;
    const dist = levenshtein(normInput, key);
    if (dist < bestDist) { bestDist = dist; bestKey = key; }
  }
  if (!bestKey) return null;
  const maxAllowed = bestKey.length <= 4 ? 1 : bestKey.length <= 8 ? 2 : 3;
  return bestDist <= maxAllowed ? lookup[bestKey] : null;
}

function startDuel(seconds) {
  const t = T[lang];
  const n1 = document.getElementById("duel-p1-name").value.trim() || t.duelP1;
  const n2 = document.getElementById("duel-p2-name").value.trim() || t.duelP2;
  duelP1 = n1; duelP2 = n2;
  duelTimerMax = seconds;
  duelScores = {1:0, 2:0};
  duelFoundCountries = {};
  duelCurrentPlayer = 1;
  duelActive = true;
  goTo("s-duel");
  renderDuelMap();
  renderDuelHUD();
  startDuelTimer();
  document.getElementById("duel-input").focus();
}

function restartDuel() {
  goTo("s-duel-setup");
}

function confirmQuitDuel() {
  if(confirm(lang==="fr"?"Abandonner la partie ?":"Quit the game?")) {
    clearInterval(duelTimerInterval);
    duelActive = false;
    goTo("s-menu-geo");
  }
}

function renderDuelMap() {
  document.getElementById("duel-map-wrap").innerHTML = buildMapSVG();
  // Color already-found countries
  for(const [norm, player] of Object.entries(duelFoundCountries)) {
    highlightCountryOnMap(norm, player);
  }
}

function highlightCountryOnMap(normalizedName, player) {
  const cls = player === 1 ? "found-p1" : "found-p2";
  const allPaths = document.querySelectorAll("#duel-map-wrap path");
  allPaths.forEach(p => {
    const nameAttr = p.getAttribute("data-country");
    if(nameAttr && normalize(nameAttr) === normalizedName) {
      p.classList.add(cls);
    }
  });
}

function renderDuelHUD() {
  const t = T[lang];
  const n1 = duelP1, n2 = duelP2;
  document.getElementById("duel-name-p1").textContent = n1;
  document.getElementById("duel-name-p2").textContent = n2;
  document.getElementById("duel-score-p1").textContent = duelScores[1];
  document.getElementById("duel-score-p2").textContent = duelScores[2];
  const c1 = document.getElementById("duel-card-p1");
  const c2 = document.getElementById("duel-card-p2");
  c1.classList.toggle("active-player", duelCurrentPlayer === 1);
  c2.classList.toggle("active-player", duelCurrentPlayer === 2);
  document.getElementById("duel-turn-banner").textContent = t.duelTurn(duelCurrentPlayer === 1 ? n1 : n2);
  document.getElementById("duel-found-label").textContent = t.duelFoundLabel(Object.keys(duelFoundCountries).length);
  document.getElementById("duel-input").placeholder = lang==="fr" ? "Nom du pays..." : "Country name...";
  // Render tags
  const wrap = document.getElementById("duel-countries-wrap");
  wrap.innerHTML = Object.entries(duelFoundCountries).map(([norm, player]) => {
    const match = WORLD_COUNTRIES.find(c => normalize(lang==="fr" ? c.fr : c.en) === norm);
    const canonical = match ? (lang==="fr" ? match.fr : match.en) : norm;
    return `<span class="duel-country-tag p${player}">${canonical}</span>`;
  }).join("");
}

function startDuelTimer() {
  clearInterval(duelTimerInterval);
  let remaining = duelTimerMax;
  const timerEl = document.getElementById("duel-timer");
  timerEl.textContent = remaining;
  timerEl.className = "duel-timer";
  duelTimerInterval = setInterval(() => {
    remaining--;
    timerEl.textContent = remaining;
    if(remaining <= 10) timerEl.className = "duel-timer danger";
    else if(remaining <= 20) timerEl.className = "duel-timer warning";
    if(remaining <= 0) {
      clearInterval(duelTimerInterval);
      handleDuelTimeUp();
    }
  }, 1000);
}

function handleDuelTimeUp() {
  if(!duelActive) return;
  const t = T[lang];
  const loserName = duelCurrentPlayer === 1 ? duelP1 : duelP2;
  const fb = document.getElementById("duel-feedback");
  fb.textContent = t.duelTimeUp(loserName);
  fb.className = "duel-feedback err";
  // The player who ran out of time loses
  endDuel(duelCurrentPlayer === 1 ? 2 : 1);
}

function submitDuel() {
  if(!duelActive) return;
  const input = document.getElementById("duel-input");
  const raw = input.value.trim();
  if(!raw) return;
  const norm = normalize(raw);
  const lookup = buildCountryLookup();
  const t = T[lang];
  const fb = document.getElementById("duel-feedback");
  const currentName = duelCurrentPlayer === 1 ? duelP1 : duelP2;

  // Fuzzy match (tolerates small typos, JetPunk-style)
  const canonical = fuzzyCountryMatch(norm, lookup);

  if(!canonical) {
    // Unknown
    fb.textContent = t.duelUnknown;
    fb.className = "duel-feedback err";
    input.classList.add("shake");
    setTimeout(()=>input.classList.remove("shake"),400);
    input.value = "";
    return;
  }

  const canonicalNorm = normalize(canonical);

  if(duelFoundCountries.hasOwnProperty(canonicalNorm)) {
    // Already said
    fb.textContent = t.duelAlready;
    fb.className = "duel-feedback err";
    input.classList.add("shake");
    setTimeout(()=>input.classList.remove("shake"),400);
    input.value = "";
    return;
  }

  // Valid country!
  duelFoundCountries[canonicalNorm] = duelCurrentPlayer;
  duelScores[duelCurrentPlayer]++;
  fb.textContent = t.duelValid(currentName, canonical);
  fb.className = "duel-feedback ok";
  input.classList.add("valid-flash");
  setTimeout(()=>input.classList.remove("valid-flash"),400);
  input.value = "";

  // Highlight on map
  highlightCountryOnMap(canonicalNorm, duelCurrentPlayer);
  // Switch player
  duelCurrentPlayer = duelCurrentPlayer === 1 ? 2 : 1;
  renderDuelHUD();
  // Restart timer for next player
  startDuelTimer();
}

function endDuel(winnerPlayer) {
  duelActive = false;
  clearInterval(duelTimerInterval);
  const t = T[lang];
  const winnerName = winnerPlayer === 1 ? duelP1 : duelP2;
  const loserName = winnerPlayer === 1 ? duelP2 : duelP1;
  document.getElementById("duel-result-emoji").textContent = "🏆";
  document.getElementById("duel-result-title").textContent = t.duelWinner(winnerName);
  document.getElementById("duel-result-sub").textContent = t.duelWinnerSub(loserName);
  document.getElementById("duel-res-p1-score").textContent = duelScores[1];
  document.getElementById("duel-res-p2-score").textContent = duelScores[2];
  document.getElementById("duel-res-p1-name").textContent = duelP1;
  document.getElementById("duel-res-p2-name").textContent = duelP2;
  document.getElementById("duel-res-again").textContent = t.duelResAgain;
  document.getElementById("duel-res-menu").textContent = t.duelResMenu;
  setTimeout(()=>goTo("s-duel-result"), 800);
}

// State
let flagMode = "solo"; // "solo" | "duel"
let flagDifficulty = "easy";
let flagQuestions = [];
let flagIndex = 0;
let flagCorrect = 0;
let flagStreak = 0;
let flagBestStreak = 0;
let flagAnswered = false;
let flagDuelP1 = "J1", flagDuelP2 = "J2";
let flagDuelScores = {1:0,2:0};
let flagDuelCurrent = 1;
let flagLastSetup = null;

function startFlagSolo(diff) {
  flagMode = "solo"; flagDifficulty = diff;
  flagLastSetup = ()=>startFlagSolo(diff);
  const pool = diff==="easy" ? FLAGS_EASY : FLAGS_HARD;
  flagQuestions = shuffle(pool).slice(0, 20);
  flagIndex = 0; flagCorrect = 0; flagStreak = 0; flagBestStreak = 0;
  document.getElementById("flag-duel-bar").style.display = "none";
  document.getElementById("flag-turn-banner").style.display = "none";
  goTo("s-flag-game");
  renderFlagQuestion();
}

function startFlagDuel(diff) {
  const t = T[lang];
  flagMode = "duel"; flagDifficulty = diff;
  flagLastSetup = ()=>startFlagDuel(diff);
  flagDuelP1 = document.getElementById("flag-dp1-name").value.trim() || t.duelP1;
  flagDuelP2 = document.getElementById("flag-dp2-name").value.trim() || t.duelP2;
  flagDuelScores = {1:0,2:0}; flagDuelCurrent = 1;
  const pool = diff==="easy" ? FLAGS_EASY : FLAGS_HARD;
  flagQuestions = shuffle(pool).slice(0, 20);
  flagIndex = 0; flagCorrect = 0; flagStreak = 0; flagBestStreak = 0;
  // Show duel HUD
  document.getElementById("flag-duel-bar").style.display = "flex";
  document.getElementById("flag-dn1").textContent = flagDuelP1;
  document.getElementById("flag-dn2").textContent = flagDuelP2;
  document.getElementById("flag-ds1").textContent = 0;
  document.getElementById("flag-ds2").textContent = 0;
  document.getElementById("flag-dc1").classList.add("active");
  document.getElementById("flag-dc2").classList.remove("active");
  document.getElementById("flag-turn-banner").style.display = "block";
  goTo("s-flag-game");
  renderFlagQuestion();
}

function replayFlag() {
  if(flagLastSetup) flagLastSetup();
}

function confirmQuitFlag() {
  if(confirm(lang==="fr"?"Quitter la partie ?":"Quit the game?")) goTo("s-menu-geo");
}

function renderFlagQuestion() {
  const t = T[lang];
  const q = flagQuestions[flagIndex];
  const pool = flagDifficulty==="easy" ? FLAGS_EASY : FLAGS_HARD;
  const total = flagQuestions.length;
  flagAnswered = false;

  document.getElementById("flag-emoji").textContent = q.flag;
  document.getElementById("flag-question-label").textContent = lang==="fr" ? "Quel pays est ce drapeau ?" : "Which country is this flag?";
  document.getElementById("flag-score-correct").textContent = flagCorrect;
  document.getElementById("flag-score-label-correct").textContent = lang==="fr" ? "✓ corrects" : "✓ correct";
  document.getElementById("flag-qnum").textContent = `${flagIndex+1}/${total}`;
  document.getElementById("flag-score-label-q").textContent = lang==="fr" ? "question" : "question";
  document.getElementById("flag-progress-bar").style.width = `${(flagIndex/total)*100}%`;
  document.getElementById("flag-streak").textContent = flagStreak >= 3 ? `🔥 x${flagStreak} combo!` : "";

  if(flagMode==="duel") {
    const name = flagDuelCurrent===1 ? flagDuelP1 : flagDuelP2;
    document.getElementById("flag-turn-banner").textContent = `🎯 ${lang==="fr"?"Tour de":"Turn:"} ${name}`;
    document.getElementById("flag-dc1").classList.toggle("active", flagDuelCurrent===1);
    document.getElementById("flag-dc2").classList.toggle("active", flagDuelCurrent===2);
  }

  // Build 4 choices: correct + 3 random wrong
  const correct = lang==="fr" ? q.fr : q.en;
  const others = shuffle(pool.filter(c=>c.flag!==q.flag)).slice(0,3).map(c=>lang==="fr"?c.fr:c.en);
  const choices = shuffle([correct, ...others]);

  const wrap = document.getElementById("flag-choices");
  wrap.innerHTML = choices.map(c => `
    <button class="flag-choice" onclick="answerFlag(this,'${c.replace(/'/g,"\\'")}','${correct.replace(/'/g,"\\'")}')">
      ${c}
    </button>`).join("");
}

function answerFlag(btn, chosen, correct) {
  if(flagAnswered) return;
  flagAnswered = true;

  // Disable all choices and reveal
  document.querySelectorAll(".flag-choice").forEach(b=>{
    b.disabled = true;
    if((lang==="fr"?b.textContent:b.textContent).trim()===correct) b.classList.add("reveal");
  });

  const isCorrect = chosen === correct;
  btn.classList.add(isCorrect ? "correct" : "wrong");

  if(isCorrect) {
    flagCorrect++;
    flagStreak++;
    if(flagStreak>flagBestStreak) flagBestStreak=flagStreak;
    if(flagMode==="duel") {
      flagDuelScores[flagDuelCurrent]++;
      document.getElementById(`flag-ds${flagDuelCurrent}`).textContent = flagDuelScores[flagDuelCurrent];
    }
  } else {
    flagStreak = 0;
  }

  if(flagMode==="duel") flagDuelCurrent = flagDuelCurrent===1?2:1;

  setTimeout(()=>{
    flagIndex++;
    if(flagIndex < flagQuestions.length) renderFlagQuestion();
    else showFlagResult();
  }, 900);
}

function showFlagResult() {
  const t = T[lang];
  const total = flagQuestions.length;
  const pct = Math.round((flagCorrect/total)*100);
  let emoji = pct>=80?"🏆":pct>=50?"😎":"😅";
  let title = pct>=80?(lang==="fr"?"Excellent !":"Excellent!"):pct>=50?(lang==="fr"?"Pas mal !":"Not bad!"):lang==="fr"?"Continue comme ça !":"Keep going!";

  if(flagMode==="duel") {
    const s1=flagDuelScores[1], s2=flagDuelScores[2];
    const winner = s1>s2?flagDuelP1:s2>s1?flagDuelP2:(lang==="fr"?"Égalité":"Draw");
    emoji = s1===s2?"🤝":"🏆";
    title = s1===s2?(lang==="fr"?"Égalité !":"It's a draw!"):`🏆 ${winner} ${lang==="fr"?"gagne !":"wins!"}`;
    document.getElementById("flag-duel-result-extra").style.display="flex";
    document.getElementById("flag-dr-n1").textContent=flagDuelP1;
    document.getElementById("flag-dr-n2").textContent=flagDuelP2;
    document.getElementById("flag-dr-s1").textContent=s1;
    document.getElementById("flag-dr-s2").textContent=s2;
  } else {
    document.getElementById("flag-duel-result-extra").style.display="none";
  }

  document.getElementById("flag-res-emoji").textContent=emoji;
  document.getElementById("flag-res-title").textContent=title;
  document.getElementById("flag-res-sub").textContent=lang==="fr"?`${flagCorrect}/${total} bonnes réponses`:`${flagCorrect}/${total} correct answers`;
  document.getElementById("flag-res-score").textContent=`${pct}%`;

function renderTriviaQuestion() {
  triviaAnswered = false;
  const q = triviaQuestions[triviaIndex];
  const total = triviaQuestions.length;

  document.getElementById("trivia-fact").textContent = lang === "fr" ? q.fact_fr : q.fact_en;
  document.getElementById("trivia-qnum").textContent = `${triviaIndex + 1}/${total}`;
  document.getElementById("trivia-score-correct").textContent = triviaCorrect;
  document.getElementById("trivia-progress-bar").style.width = `${(triviaIndex / total) * 100}%`;
  document.getElementById("trivia-streak").textContent = triviaStreak >= 3 ? `🔥 x${triviaStreak} combo!` : "";

  const correct = lang === "fr" ? q.answer.fr : q.answer.en;
  const correctFlag = q.answer.flag;
  const choiceObjs = shuffle([q.answer, ...q.wrong]);

  const wrap = document.getElementById("trivia-choices");
  wrap.innerHTML = choiceObjs.map(c => {
    const label = lang === "fr" ? c.fr : c.en;
    return `
    <button class="flag-choice" onclick="answerTrivia(this,'${label.replace(/'/g,"\\'")}','${correct.replace(/'/g,"\\'")}','${correctFlag}')">
      <span style="font-size:18px;margin-right:6px">${c.flag}</span>${label}
    </button>`;
  }).join("");
}

function answerTrivia(btn, chosen, correct, correctFlag) {
  if (triviaAnswered) return;
  triviaAnswered = true;

  document.querySelectorAll("#trivia-choices .flag-choice").forEach(b => {
    b.disabled = true;
    if (b.textContent.includes(correctFlag) && b.textContent.trim().endsWith(correct)) b.classList.add("reveal");
  });

  const isCorrect = chosen === correct;
  btn.classList.add(isCorrect ? "correct" : "wrong");

  if (isCorrect) {
    triviaCorrect++;
    triviaStreak++;
    if (triviaStreak > triviaBestStreak) triviaBestStreak = triviaStreak;
  } else {
    triviaStreak = 0;
  }

  setTimeout(() => {
    triviaIndex++;
    if (triviaIndex < triviaQuestions.length) renderTriviaQuestion();
    else showTriviaResult();
  }, 900);
}

function showTriviaResult() {
  const t = T[lang];
  const total = triviaQuestions.length;
  const pct = Math.round((triviaCorrect / total) * 100);
  const emoji = pct >= 80 ? "🏆" : pct >= 50 ? "😎" : "😅";

  document.getElementById("trivia-res-emoji").textContent = emoji;
  document.getElementById("trivia-res-title").textContent = t.triviaResTitle(pct);
  document.getElementById("trivia-res-sub").textContent = t.triviaResSub(triviaCorrect, total);
  document.getElementById("trivia-res-score").textContent = `${pct}%`;
  document.getElementById("trivia-res-score-label").textContent = t.triviaScoreLabel;
  document.getElementById("trivia-res-streak").textContent = triviaBestStreak;
  document.getElementById("trivia-res-streak-label").textContent = lang === "fr" ? "meilleur combo" : "best streak";
  document.getElementById("trivia-res-again").textContent = t.triviaResAgain;
  document.getElementById("trivia-res-menu").textContent = t.triviaResMenu;
  goTo("s-trivia-result");
}

function replayTrivia() {
  startTrivia();
}

function confirmQuitTrivia() {
  const msg = lang === "fr" ? "Quitter le quiz en cours ?" : "Quit the current quiz?";
  if (confirm(msg)) goTo("s-menu-geo");
}

// Generates a pool of countries/cities for wrong-answer choices
function geoAllCountries() {
  const set = new Set();
  GEO_LOCATIONS.forEach(l => set.add(lang==="fr" ? l.country_fr : l.country_en));
  return [...set];
}
function geoAllCities() {
  const set = new Set();
  GEO_LOCATIONS.forEach(l => set.add(lang==="fr" ? l.city_fr : l.city_en));
  return [...set];
}

// State
let geoMode = "solo"; // "solo" | "duel"
let geoLocations = [];
let geoIndex = 0;
let geoStep = "country"; // "country" | "city"
let geoPoints = 0;
let geoCountriesCorrect = 0;
let geoCitiesCorrect = 0;
let geoAnswered = false;
let geoDuelP1 = "J1", geoDuelP2 = "J2";
let geoDuelScores = {1:0,2:0};
let geoDuelCurrent = 1;
let geoLastSetup = null;

function startGeoSolo() {
  geoMode = "solo";
  geoLastSetup = startGeoSolo;
  geoLocations = shuffle(GEO_LOCATIONS).slice(0, 15);
  geoIndex = 0; geoPoints = 0; geoCountriesCorrect = 0; geoCitiesCorrect = 0;
  document.getElementById("geo-duel-bar").style.display = "none";
  document.getElementById("geo-turn-banner").style.display = "none";
  goTo("s-geo-game");
  renderGeoQuestion();
}

function startGeoDuel() {
  const t = T[lang];
  geoMode = "duel";
  geoLastSetup = startGeoDuel;
  geoDuelP1 = document.getElementById("geo-dp1-name").value.trim() || t.duelP1;
  geoDuelP2 = document.getElementById("geo-dp2-name").value.trim() || t.duelP2;
  geoDuelScores = {1:0,2:0}; geoDuelCurrent = 1;
  geoLocations = shuffle(GEO_LOCATIONS).slice(0, 15);
  geoIndex = 0; geoPoints = 0; geoCountriesCorrect = 0; geoCitiesCorrect = 0;
  document.getElementById("geo-duel-bar").style.display = "flex";
  document.getElementById("geo-dn1").textContent = geoDuelP1;
  document.getElementById("geo-dn2").textContent = geoDuelP2;
  document.getElementById("geo-ds1").textContent = 0;
  document.getElementById("geo-ds2").textContent = 0;
  document.getElementById("geo-dc1").classList.add("active");
  document.getElementById("geo-dc2").classList.remove("active");
  document.getElementById("geo-turn-banner").style.display = "block";
  goTo("s-geo-game");
  renderGeoQuestion();
}

function replayGeo() {
  if(geoLastSetup) geoLastSetup();
}

function confirmQuitGeo() {
  if(confirm(lang==="fr"?"Quitter la partie ?":"Quit the game?")) goTo("s-menu-geo");
}

function renderGeoQuestion() {
  const t = T[lang];
  const loc = geoLocations[geoIndex];
  const total = geoLocations.length;
  geoStep = "country";
  geoAnswered = false;

  document.getElementById("geo-photo-skeleton").textContent = "📷";
  document.getElementById("geo-photo-skeleton").style.display = "flex";
  const img = document.getElementById("geo-photo");
  img.src = loc.img;
  img.alt = "📍";

  document.getElementById("geo-score-pts").textContent = geoPoints;
  document.getElementById("geo-score-label-pts").textContent = lang==="fr" ? "points" : "points";
  document.getElementById("geo-qnum").textContent = `${geoIndex+1}/${total}`;
  document.getElementById("geo-score-label-q").textContent = lang==="fr" ? "lieu" : "place";
  document.getElementById("geo-progress-bar").style.width = `${(geoIndex/total)*100}%`;
  document.getElementById("geo-fun-fact").style.display = "none";

  if(geoMode==="duel") {
    const name = geoDuelCurrent===1 ? geoDuelP1 : geoDuelP2;
    document.getElementById("geo-turn-banner").textContent = `🎯 ${lang==="fr"?"Tour de":"Turn:"} ${name}`;
    document.getElementById("geo-dc1").classList.toggle("active", geoDuelCurrent===1);
    document.getElementById("geo-dc2").classList.toggle("active", geoDuelCurrent===2);
  }

  renderGeoStepCountry();
}

function renderGeoStepCountry() {
  const t = T[lang];
  const loc = geoLocations[geoIndex];
  document.getElementById("geo-step-badge").textContent = lang==="fr" ? "🌍 Étape 1 — Pays (+1pt)" : "🌍 Step 1 — Country (+1pt)";
  document.getElementById("geo-question-label").textContent = t.geoQuestion_country;

  const correct = lang==="fr" ? loc.country_fr : loc.country_en;
  const allCountries = geoAllCountries().filter(c => c !== correct);

  // Prioritize geographically/culturally "confusable" countries as decoys (the trap effect)
  const confusablePool = (CONFUSABLE_COUNTRIES[lang] || {})[correct] || [];
  const validConfusable = shuffle(confusablePool.filter(c => c !== correct));

  const remainingPool = shuffle(allCountries.filter(c => !validConfusable.includes(c)));
  const others = [...validConfusable, ...remainingPool].slice(0, 3);
  const choices = shuffle([correct, ...others]);

  const wrap = document.getElementById("geo-choices");
  wrap.innerHTML = choices.map(c => `
    <button class="geo-choice" onclick="answerGeoCountry(this,'${c.replace(/'/g,"\\'")}','${correct.replace(/'/g,"\\'")}')">${c}</button>`).join("");
}

function answerGeoCountry(btn, chosen, correct) {
  if(geoAnswered) return;
  geoAnswered = true;
  document.querySelectorAll(".geo-choice").forEach(b=>{
    b.disabled = true;
    if(b.textContent.trim()===correct) b.classList.add("reveal");
  });
  const isCorrect = chosen === correct;
  btn.classList.add(isCorrect ? "correct" : "wrong");

  if(isCorrect) {
    geoPoints++;
    geoCountriesCorrect++;
    if(geoMode==="duel") {
      geoDuelScores[geoDuelCurrent]++;
      document.getElementById(`geo-ds${geoDuelCurrent}`).textContent = geoDuelScores[geoDuelCurrent];
    }
  }

  setTimeout(()=>{
    geoAnswered = false;
    geoStep = "city";
    renderGeoStepCity();
  }, 900);
}

function renderGeoStepCity() {
  const t = T[lang];
  const loc = geoLocations[geoIndex];
  document.getElementById("geo-step-badge").textContent = lang==="fr" ? "🏙️ Étape 2 — Ville (+1pt bonus)" : "🏙️ Step 2 — City (+1pt bonus)";
  document.getElementById("geo-question-label").textContent = t.geoQuestion_city;

  const correct = lang==="fr" ? loc.city_fr : loc.city_en;
  const correctCountry = lang==="fr" ? loc.country_fr : loc.country_en;

  // 1) Try the static per-country city pool (always plausible, same-country distractors)
  const pool = CITY_POOLS[lang] || {};
  const countryPool = (pool[correctCountry] || []).filter(c => c !== correct);

  // 2) Add any other GEO_LOCATIONS cities from the same country (in case of duplicates)
  const sameCountryFromLocs = GEO_LOCATIONS
    .filter(l => (lang==="fr" ? l.country_fr : l.country_en) === correctCountry)
    .map(l => lang==="fr" ? l.city_fr : l.city_en)
    .filter(c => c !== correct && !countryPool.includes(c));

  let candidates = shuffle([...countryPool, ...sameCountryFromLocs]);

  // 3) If still not enough (e.g. tiny city-states like Singapore), pad with global cities
  if (candidates.length < 3) {
    const globalPool = GEO_LOCATIONS
      .map(l => lang==="fr" ? l.city_fr : l.city_en)
      .filter(c => c !== correct && !candidates.includes(c));
    candidates = [...candidates, ...shuffle(globalPool)];
  }

  const others = candidates.slice(0, 3);
  const choices = shuffle([correct, ...others]);

  const wrap = document.getElementById("geo-choices");
  wrap.innerHTML = choices.map(c => `
    <button class="geo-choice" onclick="answerGeoCity(this,'${c.replace(/'/g,"\\'")}','${correct.replace(/'/g,"\\'")}')">${c}</button>`).join("");
}

function answerGeoCity(btn, chosen, correct) {
  if(geoAnswered) return;
  geoAnswered = true;
  const loc = geoLocations[geoIndex];
  document.querySelectorAll(".geo-choice").forEach(b=>{
    b.disabled = true;
    if(b.textContent.trim()===correct) b.classList.add("reveal");
  });
  const isCorrect = chosen === correct;
  btn.classList.add(isCorrect ? "correct" : "wrong");

  if(isCorrect) {
    geoPoints++;
    geoCitiesCorrect++;
    if(geoMode==="duel") {
      geoDuelScores[geoDuelCurrent]++;
      document.getElementById(`geo-ds${geoDuelCurrent}`).textContent = geoDuelScores[geoDuelCurrent];
    }
  }

  // Show fun fact
  const fact = lang==="fr" ? loc.fact_fr : loc.fact_en;
  const factEl = document.getElementById("geo-fun-fact");
  factEl.textContent = `💡 ${fact}`;
  factEl.style.display = "block";

  if(geoMode==="duel") geoDuelCurrent = geoDuelCurrent===1 ? 2 : 1;

  setTimeout(()=>{
    geoIndex++;
    if(geoIndex < geoLocations.length) renderGeoQuestion();
    else showGeoResult();
  }, 2200);
}

function showGeoResult() {
  const t = T[lang];
  const total = geoLocations.length;
  const maxPts = total*2;
  const pct = Math.round((geoPoints/maxPts)*100);
  let emoji = pct>=80?"🏆":pct>=50?"😎":"😅";
  let title = pct>=80?(lang==="fr"?"Globe-trotter confirmé !":"Confirmed globe-trotter!"):pct>=50?(lang==="fr"?"Pas mal !":"Not bad!"):(lang==="fr"?"Continue d'explorer !":"Keep exploring!");

  if(geoMode==="duel") {
    const s1=geoDuelScores[1], s2=geoDuelScores[2];
    const winner = s1>s2?geoDuelP1:s2>s1?geoDuelP2:(lang==="fr"?"Égalité":"Draw");
    emoji = s1===s2?"🤝":"🏆";
    title = s1===s2?(lang==="fr"?"Égalité !":"It's a draw!"):`🏆 ${winner} ${lang==="fr"?"gagne !":"wins!"}`;
    document.getElementById("geo-duel-result-extra").style.display="flex";
    document.getElementById("geo-dr-n1").textContent=geoDuelP1;
    document.getElementById("geo-dr-n2").textContent=geoDuelP2;
    document.getElementById("geo-dr-s1").textContent=s1;
    document.getElementById("geo-dr-s2").textContent=s2;
  } else {
    document.getElementById("geo-duel-result-extra").style.display="none";
  }

  document.getElementById("geo-res-emoji").textContent=emoji;
  document.getElementById("geo-res-title").textContent=title;
  document.getElementById("geo-res-sub").textContent=lang==="fr"?`${geoPoints}/${maxPts} points`:`${geoPoints}/${maxPts} points`;
  document.getElementById("geo-res-pts").textContent=geoPoints;
  document.getElementById("geo-res-pts-label").textContent=lang==="fr"?"points":"points";
  document.getElementById("geo-res-countries").textContent=geoCountriesCorrect;
  document.getElementById("geo-res-countries-label").textContent=lang==="fr"?"pays trouvés":"countries found";
  document.getElementById("geo-res-cities").textContent=geoCitiesCorrect;
  document.getElementById("geo-res-cities-label").textContent=lang==="fr"?"villes trouvées":"cities found";
  document.getElementById("geo-res-again").textContent=lang==="fr"?"Rejouer":"Play again";
  document.getElementById("geo-res-menu").textContent=lang==="fr"?"Menu géographie":"Geography menu";
  goTo("s-geo-result");
}
</script>
